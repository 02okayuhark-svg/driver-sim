<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Driver Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e0ddd8;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .title-sub {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #555;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .title-main {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 0.1em;
    transition: color 0.4s;
    margin-bottom: 24px;
  }
  .driver-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .driver-tab {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid #333;
    color: #555;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    font-family: 'Courier New', monospace;
  }
  .driver-tab.active {
    /* set by JS */
  }
  .canvas-wrap {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1/1;
    background: #0e0e16;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
    transition: border-color 0.4s;
    border: 1px solid #1a1a2a;
  }
  #mainSvg { width: 100%; height: 100%; }
  .desc-overlay {
    position: absolute;
    bottom: 10px;
    left: 12px;
    font-size: 9px;
    letter-spacing: 0.12em;
    font-family: 'Courier New', monospace;
  }
  .meters {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .meter-box {
    background: #0e0e16;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .meter-label {
    font-size: 9px;
    color: #555;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .meter-bar-bg {
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
  }
  .meter-bar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width 0.05s, background 0.1s;
  }
  .meter-value {
    font-size: 14px;
    margin-top: 6px;
    transition: color 0.4s;
  }
  .exc-bar-bg {
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .exc-bar {
    height: 100%;
    position: absolute;
    left: 50%;
    width: 0%;
    transition: width 0.05s;
  }
  .ctrl-btn {
    padding: 12px 36px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.25em;
    font-family: 'Courier New', monospace;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .hint {
    margin-top: 12px;
    font-size: 10px;
    color: #444;
    letter-spacing: 0.1em;
  }
  .error-msg {
    margin-top: 12px;
    font-size: 11px;
    color: #e05050;
  }
</style>
</head>
<body>

<div class="title-sub">TRANSDUCER SIMULATION SYSTEM</div>
<div class="title-main" id="titleMain">AUDIO DRIVER VISUALIZER</div>

<div class="driver-tabs" id="driverTabs"></div>

<div class="canvas-wrap" id="canvasWrap">
  <svg id="mainSvg" viewBox="0 0 400 400">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="bgGrad" cx="50%" cy="50%">
        <stop offset="0%" id="bgStop0"/>
        <stop offset="100%" stop-color="#0e0e16"/>
      </radialGradient>
    </defs>
    <rect width="400" height="400" fill="url(#bgGrad)"/>
    <!-- grid -->
    <line x1="100" y1="0" x2="100" y2="400" stroke="#ffffff08" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#ffffff08" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff08" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#ffffff08" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff08" stroke-width="1"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#ffffff08" stroke-width="1"/>
    <g id="driverGroup"></g>
    <circle cx="200" cy="200" r="2" id="centerDot" fill="#33333388"/>
  </svg>
  <div class="desc-overlay" id="descOverlay"></div>
</div>

<div class="meters">
  <div class="meter-box">
    <div class="meter-label">LEVEL (dBFS)</div>
    <div class="meter-bar-bg"><div class="meter-bar" id="dbBar"></div></div>
    <div class="meter-value" id="dbVal">-60.0 dB</div>
  </div>
  <div class="meter-box">
    <div class="meter-label">DOM. FREQ</div>
    <div class="meter-value" id="freqVal" style="margin-top:18px">--- Hz</div>
  </div>
  <div class="meter-box">
    <div class="meter-label">EXCURSION</div>
    <div class="exc-bar-bg"><div class="exc-bar" id="excBar"></div></div>
    <div class="meter-value" id="excVal">0.00 mm</div>
  </div>
  <div class="meter-box">
    <div class="meter-label">Fs (共振周波数)</div>
    <div class="meter-value" id="fsVal" style="margin-top:18px">--- Hz</div>
  </div>
</div>

<button class="ctrl-btn" id="ctrlBtn">▶ START MIC</button>
<div class="error-msg" id="errorMsg"></div>
<div class="hint" id="hint">マイクを許可してリアルタイム可視化を開始</div>

<script>
const DRIVERS = {
  dynamic: {
    label: "ダイナミック",
    color: "#e8d5a3",
    accent: "#c4a35a",
    desc: "コーン型振動板 / ボイスコイル駆動",
    excMult: 1.0,
    fs: 80,
  },
  ba: {
    label: "BA",
    color: "#a8c4d4",
    accent: "#5a9ab8",
    desc: "小型アーマチュア / 密閉型",
    excMult: 0.18,
    fs: 1200,
  },
  planar: {
    label: "平面駆動",
    color: "#b8d4a8",
    accent: "#5a9850",
    desc: "薄膜振動板 / マグネット配列",
    excMult: 0.35,
    fs: 400,
  },
  electrostatic: {
    label: "静電型",
    color: "#d4a8c4",
    accent: "#9850a0",
    desc: "静電誘引 / 超薄膜",
    excMult: 0.12,
    fs: 2000,
  },
};

let selected = "dynamic";
let isListening = false;
let audioCtx = null, analyser = null, source = null, stream = null;
let animFrame = null;
let excursion = 0, vel = 0, amplitude = 0;

// SVG helpers
const svgNS = "http://www.w3.org/2000/svg";
function el(tag, attrs) {
  const e = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Build tabs
const tabsEl = document.getElementById("driverTabs");
for (const [key, d] of Object.entries(DRIVERS)) {
  const btn = document.createElement("button");
  btn.className = "driver-tab";
  btn.textContent = d.label;
  btn.dataset.key = key;
  btn.onclick = () => selectDriver(key);
  tabsEl.appendChild(btn);
}

function selectDriver(key) {
  selected = key;
  excursion = 0; vel = 0;
  applyTheme();
  drawDriver(0, 0);
}

function applyTheme() {
  const d = DRIVERS[selected];
  document.getElementById("titleMain").style.color = d.accent;
  document.getElementById("canvasWrap").style.borderColor = d.accent + "44";
  document.getElementById("descOverlay").textContent = d.desc;
  document.getElementById("descOverlay").style.color = d.accent + "88";
  document.getElementById("centerDot").setAttribute("fill", d.accent + "44");
  document.getElementById("bgStop0").setAttribute("stop-color", d.accent + "08");
  document.getElementById("fsVal").textContent = `~${d.fs} Hz`;
  document.getElementById("fsVal").style.color = d.accent;
  document.getElementById("dbVal").style.color = d.accent;
  document.getElementById("freqVal").style.color = d.accent;
  document.getElementById("excVal").style.color = d.accent;
  document.getElementById("dbBar").style.background = d.accent;
  document.getElementById("excBar").style.background = d.accent;
  if (!isListening) {
    document.getElementById("ctrlBtn").style.borderColor = d.accent;
    document.getElementById("ctrlBtn").style.color = d.accent;
    document.getElementById("ctrlBtn").style.background = d.accent + "18";
  }
  for (const btn of tabsEl.querySelectorAll(".driver-tab")) {
    const k = btn.dataset.key;
    const dd = DRIVERS[k];
    if (k === selected) {
      btn.style.borderColor = dd.accent;
      btn.style.color = dd.accent;
      btn.style.background = dd.accent + "22";
    } else {
      btn.style.borderColor = "#333";
      btn.style.color = "#555";
      btn.style.background = "transparent";
    }
  }
}

// Draw functions
function drawDriver(exc, amp) {
  const g = document.getElementById("driverGroup");
  while (g.firstChild) g.removeChild(g.firstChild);
  const d = DRIVERS[selected];
  if (selected === "dynamic") drawDynamic(g, exc, amp, d);
  else if (selected === "ba") drawBA(g, exc, amp, d);
  else if (selected === "planar") drawPlanar(g, exc, amp, d);
  else if (selected === "electrostatic") drawElectrostatic(g, exc, amp, d);
}

function drawDynamic(g, exc, amp, d) {
  const ex = exc * 22;
  const cx = 200, cy = 200;
  const coneTopW = 28, coneBottomW = 110, coneH = 90;
  const surroundH = 18, vcH = 38, vcW = 28;
  const magnetW = 70, magnetH = 50, gapW = 30, dustcapR = 26;
  const surround = amp * 4;

  // Spider
  const sp1 = el("ellipse", { cx, cy: cy + coneH/2 + vcH + 8 + ex, rx: 38, ry: 6 + Math.abs(ex)*0.2, fill:"none", stroke:d.accent, "stroke-width":2, opacity:0.5 });
  const sp2 = el("ellipse", { cx, cy: cy + coneH/2 + vcH + 8 + ex, rx: 52, ry: 8 + Math.abs(ex)*0.2, fill:"none", stroke:d.accent, "stroke-width":1.5, opacity:0.3 });
  g.appendChild(sp1); g.appendChild(sp2);

  // Basket
  for (const side of [-1,1]) {
    g.appendChild(el("line", { x1: cx+side*(coneBottomW+10), y1: cy-surroundH-8, x2: cx+side*(magnetW/2+5), y2: cy+coneH/2+vcH+magnetH/2+2, stroke:d.accent, "stroke-width":1.5, opacity:0.25 }));
  }

  // Magnet
  g.appendChild(el("rect", { x: cx-magnetW/2, y: cy+coneH/2+vcH, width:magnetW, height:magnetH, rx:3, fill:d.accent+"33", stroke:d.accent, "stroke-width":1.5, opacity:0.8 }));
  g.appendChild(el("rect", { x: cx-gapW/2, y: cy+coneH/2+vcH-2, width:gapW, height:12, fill:d.accent+"44", stroke:d.accent, "stroke-width":1, opacity:0.6 }));
  g.appendChild(el("rect", { x: cx-10, y: cy+coneH/2+vcH+12, width:20, height:magnetH-12, fill:d.accent, opacity:0.5 }));

  // Voice coil
  g.appendChild(el("rect", { x: cx-vcW/2, y: cy+coneH/2+ex-2, width:vcW, height:vcH, fill:"none", stroke:d.accent, "stroke-width":3, rx:2, opacity:0.9 }));
  for (let i = 0; i < 4; i++) {
    g.appendChild(el("line", { x1:cx-vcW/2, y1:cy+coneH/2+ex-2+i*(vcH/4), x2:cx+vcW/2, y2:cy+coneH/2+ex-2+i*(vcH/4), stroke:d.accent, "stroke-width":0.8, opacity:0.4 }));
  }

  // Surround
  for (const side of [-1,1]) {
    g.appendChild(el("path", { d:`M ${cx+side*coneBottomW/2} ${cy-surroundH/2+ex} Q ${cx+side*(coneBottomW/2+surroundH)} ${cy-surroundH/2+ex+surround*side} ${cx+side*(coneBottomW/2+surroundH*2)} ${cy+ex}`, fill:"none", stroke:d.color, "stroke-width":3, opacity:0.7 }));
  }

  // Cone
  g.appendChild(el("path", { d:`M ${cx-coneTopW/2} ${cy+coneH/2+ex} L ${cx-coneBottomW/2} ${cy-surroundH/2+ex} L ${cx+coneBottomW/2} ${cy-surroundH/2+ex} L ${cx+coneTopW/2} ${cy+coneH/2+ex} Z`, fill:d.color+"22", stroke:d.color, "stroke-width":2 }));

  // Dustcap
  g.appendChild(el("ellipse", { cx, cy:cy+coneH/2+ex, rx:dustcapR, ry:dustcapR*0.35, fill:d.color+"44", stroke:d.color, "stroke-width":2 }));

  // Air waves
  if (Math.abs(ex) > 2) {
    for (let i = 1; i <= 3; i++) {
      g.appendChild(el("ellipse", { cx, cy:cy-surroundH/2+ex-i*22, rx:coneBottomW/2+i*18, ry:8+i*4, fill:"none", stroke:d.color, "stroke-width":1.5-i*0.4, opacity:(0.4-i*0.12)*(Math.abs(ex)/22) }));
    }
  }
}

function drawBA(g, exc, amp, d) {
  const ex = exc * 3.5;
  const cx = 200, cy = 200;
  const armW = 80, armH = 8, magH = 30, magW = 50;

  // Housing
  g.appendChild(el("rect", { x:cx-70, y:cy-55, width:140, height:110, rx:8, fill:d.color+"11", stroke:d.accent, "stroke-width":1.5, opacity:0.5 }));

  // Magnets
  for (const side of [-1,1]) {
    g.appendChild(el("rect", { x:cx-magW/2, y:cy+side*28-magH/2, width:magW, height:magH, rx:3, fill:d.accent+"33", stroke:d.accent, "stroke-width":1.5 }));
    const t = el("text", { x:cx, y:cy+side*28+5, "text-anchor":"middle", fill:d.accent, "font-size":10, opacity:0.6, "font-family":"monospace" });
    t.textContent = side === -1 ? "N" : "S";
    g.appendChild(t);
  }

  // Gap
  g.appendChild(el("rect", { x:cx-magW/2-2, y:cy-14, width:magW+4, height:28, fill:d.accent+"15" }));

  // Armature
  g.appendChild(el("rect", { x:cx-armW/2, y:cy-armH/2+ex, width:armW, height:armH, rx:2, fill:d.color, stroke:d.color, "stroke-width":1, opacity:0.8 }));

  // Drive rod
  g.appendChild(el("line", { x1:cx+armW/2, y1:cy+ex, x2:cx+armW/2+30, y2:cy+ex*2.5, stroke:d.accent, "stroke-width":2.5 }));

  // Diaphragm
  g.appendChild(el("path", { d:`M ${cx+armW/2+28} ${cy-35+ex*2.5} Q ${cx+armW/2+50} ${cy+ex*2.5} ${cx+armW/2+28} ${cy+35+ex*2.5}`, fill:d.color+"30", stroke:d.color, "stroke-width":2 }));

  // Coil
  for (const i of [-3,-1,1,3]) {
    g.appendChild(el("ellipse", { cx:cx+i*8, cy:cy+ex, rx:5, ry:armH/2+4, fill:"none", stroke:d.accent, "stroke-width":1.2, opacity:0.5 }));
  }

  // Air lines
  if (Math.abs(ex) > 0.5) {
    for (let i = 1; i <= 2; i++) {
      g.appendChild(el("path", { d:`M ${cx+armW/2+58+i*14} ${cy-20+ex*2.5} Q ${cx+armW/2+65+i*14} ${cy+ex*2.5} ${cx+armW/2+58+i*14} ${cy+20+ex*2.5}`, fill:"none", stroke:d.color, "stroke-width":1.5-i*0.4, opacity:(0.5-i*0.15)*Math.min(1,Math.abs(ex)) }));
    }
  }
}

function drawPlanar(g, exc, amp, d) {
  const ex = exc * 7;
  const cx = 200, cy = 200;
  const cols = 7, rows = 6;

  // Magnet arrays
  for (const side of [-1,1]) {
    for (let i = 0; i < cols; i++) {
      g.appendChild(el("rect", { x:cx-110+i*32, y:cy+side*55, width:20, height:16, rx:2, fill:side===-1?d.accent+"55":d.accent+"33", stroke:d.accent, "stroke-width":1.2 }));
    }
  }

  // Diaphragm
  g.appendChild(el("rect", { x:cx-110, y:cy-45+ex*0.5, width:220, height:90, rx:2, fill:d.color+"18", stroke:d.color, "stroke-width":1.5 }));

  // Traces
  for (let row = 0; row < rows; row++) {
    const y = cy - 35 + row * 14 + ex * 0.5;
    const waveAmp = amp * 3;
    const pts = [];
    for (let i = 0; i < 20; i++) {
      const x = cx - 100 + i * 11;
      const wave = Math.sin(i * 0.8 + row * 1.2) * waveAmp;
      pts.push(`${x},${y + wave}`);
    }
    g.appendChild(el("polyline", { points:pts.join(" "), fill:"none", stroke:d.accent, "stroke-width":1.8, opacity:0.7 }));
  }

  // Field lines
  if (amp > 0.1) {
    for (let i = 0; i < 5; i++) {
      g.appendChild(el("line", { x1:cx-80+i*40, y1:cy-55, x2:cx-80+i*40, y2:cy+55, stroke:d.accent, "stroke-width":0.8, opacity:0.2*amp, "stroke-dasharray":"3,4" }));
    }
  }

  // Air displacement
  if (Math.abs(ex) > 1) {
    for (const side of [-1,1]) {
      for (let i = 1; i <= 2; i++) {
        g.appendChild(el("rect", { x:cx-110-i*20, y:cy-40+ex*side*0.3, width:10, height:80, rx:3, fill:"none", stroke:d.color, "stroke-width":1, opacity:(0.3-i*0.1)*Math.abs(ex)/7 }));
      }
    }
  }
}

function drawElectrostatic(g, exc, amp, d) {
  const ex = exc * 2.5;
  const cx = 200, cy = 200;

  // Stators
  for (const side of [-1,1]) {
    g.appendChild(el("rect", { x:cx-100, y:cy+side*45, width:200, height:12, rx:2, fill:d.accent+"22", stroke:d.accent, "stroke-width":1.5 }));
    for (let i = 0; i < 9; i++) {
      g.appendChild(el("ellipse", { cx:cx-80+i*20, cy:cy+side*51, rx:5, ry:3, fill:d.accent+"33", stroke:d.accent, "stroke-width":0.8 }));
    }
  }

  // Diaphragm
  g.appendChild(el("rect", { x:cx-95, y:cy-1+ex, width:190, height:2, rx:1, fill:d.color, stroke:d.color, "stroke-width":1, opacity:0.9 }));

  // Field lines
  for (let i = 0; i < 11; i++) {
    const x = cx - 90 + i * 18;
    g.appendChild(el("line", { x1:x, y1:cy-44, x2:x, y2:cy+ex-2, stroke:d.accent, "stroke-width":0.8, opacity:0.15+amp*0.3, "stroke-dasharray":`2,${3-amp}` }));
    g.appendChild(el("line", { x1:x, y1:cy+ex+2, x2:x, y2:cy+44, stroke:d.accent, "stroke-width":0.8, opacity:0.15+amp*0.3, "stroke-dasharray":`2,${3-amp}` }));
  }

  // Glow rect
  if (amp > 0.15) {
    g.appendChild(el("rect", { x:cx-95, y:cy-42, width:190, height:84, rx:3, fill:"none", stroke:d.accent, "stroke-width":1, opacity:amp*0.4, filter:"url(#glow)" }));
  }

  // Bias label
  const t = el("text", { x:cx, y:cy+75, "text-anchor":"middle", fill:d.accent, "font-size":9, opacity:0.5, "font-family":"monospace" });
  t.textContent = "BIAS: ~580V";
  g.appendChild(t);
}

// Audio
async function startListening() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.7;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    isListening = true;
    document.getElementById("errorMsg").textContent = "";
    document.getElementById("hint").style.display = "none";
    const btn = document.getElementById("ctrlBtn");
    btn.textContent = "■ STOP";
    btn.style.borderColor = "#e05050";
    btn.style.color = "#e05050";
    btn.style.background = "#1a0a0a";
    tick();
  } catch(e) {
    document.getElementById("errorMsg").textContent = "マイクへのアクセスが許可されませんでした";
  }
}

function stopListening() {
  cancelAnimationFrame(animFrame);
  if (source) source.disconnect();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  audioCtx = null; analyser = null; source = null; stream = null;
  isListening = false;
  excursion = 0; vel = 0; amplitude = 0;
  const d = DRIVERS[selected];
  const btn = document.getElementById("ctrlBtn");
  btn.textContent = "▶ START MIC";
  btn.style.borderColor = d.accent;
  btn.style.color = d.accent;
  btn.style.background = d.accent + "18";
  document.getElementById("hint").style.display = "";
  document.getElementById("dbVal").textContent = "-60.0 dB";
  document.getElementById("freqVal").textContent = "--- Hz";
  document.getElementById("excVal").textContent = "0.00 mm";
  document.getElementById("dbBar").style.width = "0%";
  document.getElementById("excBar").style.width = "0%";
  drawDriver(0, 0);
}

function tick() {
  const bufLen = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufLen);
  const freqData = new Uint8Array(bufLen);

  function frame() {
    analyser.getByteTimeDomainData(dataArray);
    analyser.getByteFrequencyData(freqData);

    let sum = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = (dataArray[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / bufLen);
    const db = Math.max(-60, 20 * Math.log10(rms + 1e-10));

    let maxVal = 0, maxIdx = 0;
    for (let i = 1; i < bufLen; i++) {
      if (freqData[i] > maxVal) { maxVal = freqData[i]; maxIdx = i; }
    }
    const domFreq = Math.round(maxIdx * audioCtx.sampleRate / analyser.fftSize);

    amplitude = Math.min(1, rms * 8);

    const drv = DRIVERS[selected];
    const target = amplitude * drv.excMult * 20;
    vel = vel * 0.75 - (excursion - target) * 0.12;
    excursion += vel;

    // Update meters
    const dbNorm = Math.max(0, (db + 60) / 60);
    const dbBar = document.getElementById("dbBar");
    dbBar.style.width = (dbNorm * 100) + "%";
    dbBar.style.background = dbNorm > 0.8 ? "#e05050" : dbNorm > 0.6 ? "#e0a050" : drv.accent;
    document.getElementById("dbVal").textContent = db.toFixed(1) + " dB";
    document.getElementById("freqVal").textContent = amplitude > 0.05 ? domFreq.toLocaleString() + " Hz" : "--- Hz";
    const excMm = (Math.abs(excursion) * drv.excMult * 0.8).toFixed(2);
    document.getElementById("excVal").textContent = excMm + " mm";
    document.getElementById("excBar").style.width = (Math.abs(excursion) * drv.excMult * 100) + "%";

    drawDriver(excursion, amplitude);
    animFrame = requestAnimationFrame(frame);
  }
  frame();
}

document.getElementById("ctrlBtn").onclick = () => {
  if (isListening) stopListening();
  else startListening();
};

// Init
selectDriver("dynamic");
</script>
